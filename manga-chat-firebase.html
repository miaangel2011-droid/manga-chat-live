<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✨ Manga Chat Live ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCu2myaWSAAm3iuVJri4kFO",
    authDomain:        "manga-chat-live.firebaseapp.com",
    databaseURL:       "https://manga-chat-live-default-rtdb.firebaseio.com",
    projectId:         "manga-chat-live",
    storageBucket:     "manga-chat-live.firebasestorage.app",
    messagingSenderId: "38939579009",
    appId:             "1:38939579009:web:d7e15fecaf7"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let myRole='', typingRef, messagesRef;

  window.joinRoom = function(code, role) {
    myRole = role;
    const roomCode = code.toUpperCase().trim();
    typingRef   = ref(db, `rooms/${roomCode}/typing/${role}`);
    messagesRef = ref(db, `rooms/${roomCode}/messages`);
    const otherTyping = ref(db, `rooms/${roomCode}/typing/${role==='A'?'B':'A'}`);
    onValue(otherTyping, s => updateLive(s.val()||''));
    onValue(messagesRef, s => { if(s.val()) renderMsgs(s.val()); });
  };

  window.sendTyping  = t => typingRef && set(typingRef, t);
  window.sendMessage = function(text) {
    if(!messagesRef||!text.trim()) return;
    push(messagesRef, {text:text.trim(), role:myRole, ts:serverTimestamp()});
    set(typingRef,'');
  };

  function updateLive(text) {
    const bubble=document.getElementById('liveBubble');
    const hint=document.getElementById('liveHint');
    if(!bubble) return;
    if(!text){ bubble.innerHTML=''; hint.style.opacity='.4'; hint.textContent='💬 En attente...'; return; }
    hint.style.opacity='1'; hint.textContent='✍️ En train d\'écrire...';
    bubble.innerHTML='';
    for(const ch of text){
      const s=document.createElement('span'); s.className='letter';
      s.textContent=ch===' '?'\u00A0':ch; bubble.appendChild(s);
    }
  }

  function renderMsgs(data) {
    const c=document.getElementById('msgList'); if(!c) return;
    c.innerHTML='';
    Object.values(data).sort((a,b)=>(a.ts||0)-(b.ts||0)).forEach(msg=>{
      const d=document.createElement('div');
      d.className=`msg-bubble ${msg.role===myRole?'mine':'theirs'}`;
      d.textContent=msg.text; c.appendChild(d);
    });
    c.scrollTop=c.scrollHeight;
  }
</script>

<style>
:root{--pink:#FF6B9D;--blue:#4FC3F7;--yellow:#FFD54F;--mint:#69F0AE;--purple:#CE93D8;--dark:#0d0520;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--dark);font-family:'Nunito',sans-serif;min-height:100vh;color:white;overflow-x:hidden;}

#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite;animation-delay:var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}

.sparkle{position:fixed;pointer-events:none;z-index:999;font-size:1.4rem;animation:sparkleUp .9s ease-out forwards;}
@keyframes sparkleUp{to{opacity:0;transform:translateY(-90px) rotate(360deg) scale(.2);}}

.screen{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:10;}
.screen.active{display:flex;}

/* ACCUEIL */
#homeScreen{align-items:center;justify-content:center;padding:30px 20px;gap:22px;}
.logo{font-family:'Bangers',cursive;font-size:clamp(2.4rem,10vw,4rem);letter-spacing:4px;text-align:center;background:linear-gradient(135deg,var(--pink),var(--yellow),var(--blue),var(--mint));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;filter:drop-shadow(0 0 20px rgba(255,107,157,.5));}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.tagline{color:var(--purple);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;font-weight:900;text-align:center;margin-top:-14px;}

.card{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:26px 22px;width:100%;max-width:380px;backdrop-filter:blur(12px);}
.card h2{font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:2px;margin-bottom:18px;text-align:center;color:var(--yellow);}
.field-label{font-size:.72rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px;display:block;}
.text-input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;color:white;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;outline:none;transition:border-color .3s,box-shadow .3s;margin-bottom:14px;}
.text-input:focus{border-color:rgba(255,107,157,.6);box-shadow:0 0 15px rgba(255,107,157,.2);}
.text-input::placeholder{color:rgba(255,255,255,.2);}

.role-select{display:flex;gap:10px;margin-bottom:18px;}
.role-btn{flex:1;padding:12px 8px;border-radius:14px;border:2px solid var(--border);background:transparent;color:white;font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:1px;cursor:pointer;transition:all .25s;}
.role-btn.sel-a{border-color:var(--pink);background:rgba(255,107,157,.2);box-shadow:0 0 15px rgba(255,107,157,.3);}
.role-btn.sel-b{border-color:var(--blue);background:rgba(79,195,247,.2);box-shadow:0 0 15px rgba(79,195,247,.3);}

.main-btn{width:100%;padding:14px;border-radius:16px;border:none;font-family:'Bangers',cursive;font-size:1.3rem;letter-spacing:2px;cursor:pointer;transition:transform .2s,box-shadow .2s;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 6px 25px rgba(255,107,157,.4);color:white;}
.main-btn:active{transform:scale(.97);}
.error-msg{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);border-radius:10px;padding:10px 14px;font-size:.82rem;color:#ff8080;text-align:center;display:none;margin-bottom:10px;}

/* CHAT */
#chatScreen{padding:0;}
.chat-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);}
.chat-header.role-a{background:linear-gradient(135deg,rgba(255,107,157,.2),rgba(206,147,216,.1));}
.chat-header.role-b{background:linear-gradient(135deg,rgba(79,195,247,.2),rgba(105,240,174,.1));}

.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;position:relative;}
.avatar.role-a{background:linear-gradient(135deg,#FF6B9D,#FF8A80);box-shadow:0 4px 15px rgba(255,107,157,.5);}
.avatar.role-b{background:linear-gradient(135deg,#4FC3F7,#40C4FF);box-shadow:0 4px 15px rgba(79,195,247,.5);}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;background:var(--mint);border-radius:50%;border:2px solid var(--dark);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(105,240,174,.5);}50%{box-shadow:0 0 0 6px rgba(105,240,174,0);}}

.header-info{flex:1;}
.header-info h2{font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:2px;}
.header-info .room-tag{font-size:.65rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;opacity:.5;}
.leave-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:10px;padding:7px 12px;color:white;font-size:.75rem;font-weight:900;cursor:pointer;letter-spacing:1px;}

.live-zone{margin:12px 14px;background:rgba(255,255,255,.03);border-radius:18px;border:1.5px solid var(--border);padding:14px;min-height:72px;}
#liveHint{font-size:.7rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;opacity:.4;transition:opacity .3s;color:var(--pink);}
#liveBubble{font-size:.95rem;font-weight:700;line-height:1.6;min-height:22px;word-break:break-word;}
.letter{display:inline;animation:letterPop .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes letterPop{0%{opacity:0;transform:scale(.2) translateY(6px);}100%{opacity:1;transform:scale(1) translateY(0);}}

#msgList{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.msg-bubble{max-width:78%;padding:10px 16px;border-radius:18px;font-size:.88rem;font-weight:700;animation:msgIn .3s cubic-bezier(.34,1.56,.64,1) both;word-break:break-word;}
@keyframes msgIn{from{opacity:0;transform:scale(.8) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mine{align-self:flex-end;background:linear-gradient(135deg,var(--pink),var(--purple));border-bottom-right-radius:4px;box-shadow:0 4px 15px rgba(255,107,157,.3);}
.theirs{align-self:flex-start;background:linear-gradient(135deg,var(--blue),var(--mint));border-bottom-left-radius:4px;box-shadow:0 4px 15px rgba(79,195,247,.3);}

.input-bar{padding:12px 14px;display:flex;gap:10px;align-items:center;border-top:1px solid var(--border);background:rgba(13,5,32,.85);position:sticky;bottom:0;}
#msgInput{flex:1;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:20px;padding:12px 18px;color:white;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;transition:border-color .3s,box-shadow .3s;}
#msgInput:focus{border-color:rgba(255,107,157,.6);box-shadow:0 0 15px rgba(255,107,157,.2);}
#msgInput::placeholder{color:rgba(255,255,255,.2);}
#sendBtn{width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 4px 15px rgba(255,107,157,.4);font-size:1.2rem;cursor:pointer;flex-shrink:0;transition:transform .2s;display:flex;align-items:center;justify-content:center;}
#sendBtn:active{transform:scale(.9);}

#loadingOverlay{position:fixed;inset:0;background:rgba(13,5,32,.95);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loadingOverlay.hidden{display:none;}
.spinner{width:48px;height:48px;border-radius:50%;border:4px solid rgba(255,107,157,.2);border-top-color:var(--pink);animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingOverlay p{font-family:'Bangers',cursive;font-size:1.2rem;letter-spacing:2px;color:var(--pink);}
</style>
</head>
<body>

<div id="stars"></div>
<div id="loadingOverlay" class="hidden"><div class="spinner"></div><p>CONNEXION...</p></div>

<!-- ACCUEIL -->
<div id="homeScreen" class="screen active">
  <div class="logo">✨ MANGA<br>CHAT LIVE ✨</div>
  <p class="tagline">⚡ Frappe en temps réel ⚡</p>
  <div class="card">
    <h2>🚀 REJOINDRE UN SALON</h2>
    <label class="field-label">Code du salon</label>
    <input class="text-input" id="roomInput" type="text" placeholder="ex: SAKURA123" maxlength="12" oninput="this.value=this.value.toUpperCase()">
    <label class="field-label">Ton pseudo</label>
    <input class="text-input" id="nameInput" type="text" placeholder="ex: Sakura 🌸" maxlength="20">
    <label class="field-label">Tu es...</label>
    <div class="role-select">
      <button class="role-btn" id="btnA" onclick="selectRole('A')">🌸 Joueur A</button>
      <button class="role-btn" id="btnB" onclick="selectRole('B')">💙 Joueur B</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="main-btn" onclick="startChat()">⚡ ENTRER DANS LE SALON ⚡</button>
  </div>
  <p style="font-size:.7rem;color:rgba(255,255,255,.2);text-align:center;max-width:300px;">Partage le même code avec ton ami(e) — choisis des rôles différents (A ou B)</p>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="chat-header" id="chatHeader">
    <div class="avatar" id="myAvatar">🌸<div class="online-dot"></div></div>
    <div class="header-info">
      <h2 id="myName">SAKURA</h2>
      <div class="room-tag" id="roomTag">SALON: —</div>
    </div>
    <button class="leave-btn" onclick="leaveRoom()">✕ Quitter</button>
  </div>
  <div class="live-zone">
    <div id="liveHint">💬 En attente...</div>
    <div id="liveBubble"></div>
  </div>
  <div id="msgList"></div>
  <div class="input-bar">
    <input id="msgInput" type="text" placeholder="Écris ton message... ✨" oninput="onTyping()" autocomplete="off">
    <button id="sendBtn" onclick="onSend()">💌</button>
  </div>
</div>

<script>
// Stars
const sc=document.getElementById('stars');
const cols=['#FF6B9D','#4FC3F7','#FFD54F','#69F0AE','#CE93D8','#fff'];
for(let i=0;i<70;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*3+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};--d:${1.5+Math.random()*3}s;--dl:${Math.random()*3}s;`;
  sc.appendChild(s);
}

const emo=['✨','⭐','💫','🌟','💥','💕','🎵'];
function sparkle(x,y){
  const e=document.createElement('div');e.className='sparkle';
  e.textContent=emo[Math.floor(Math.random()*emo.length)];
  e.style.cssText=`left:${x}px;top:${y}px;`;
  document.body.appendChild(e);setTimeout(()=>e.remove(),900);
}

let selectedRole='';
function selectRole(r){
  selectedRole=r;
  document.getElementById('btnA').className='role-btn'+(r==='A'?' sel-a':'');
  document.getElementById('btnB').className='role-btn'+(r==='B'?' sel-b':'');
}
function showError(msg){
  const el=document.getElementById('errorMsg');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}
function startChat(){
  const room=document.getElementById('roomInput').value.trim();
  const name=document.getElementById('nameInput').value.trim();
  if(!room) return showError('⚠️ Entre un code de salon !');
  if(!name) return showError('⚠️ Entre ton pseudo !');
  if(!selectedRole) return showError('⚠️ Choisis ton rôle (A ou B) !');
  document.getElementById('loadingOverlay').classList.remove('hidden');
  window.joinRoom(room,selectedRole);
  const isA=selectedRole==='A';
  document.getElementById('chatHeader').className=`chat-header role-${isA?'a':'b'}`;
  document.getElementById('myAvatar').className=`avatar role-${isA?'a':'b'}`;
  document.getElementById('myAvatar').innerHTML=(isA?'🌸':'💙')+'<div class="online-dot"></div>';
  document.getElementById('myName').textContent=name.toUpperCase();
  document.getElementById('roomTag').textContent=`SALON: ${room}`;
  document.getElementById('msgInput').placeholder=`${name} écrit... ✨`;
  setTimeout(()=>{
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('homeScreen').classList.remove('active');
    document.getElementById('chatScreen').classList.add('active');
  },800);
}
function leaveRoom(){
  document.getElementById('chatScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('msgList').innerHTML='';
  document.getElementById('liveBubble').innerHTML='';
  document.getElementById('msgInput').value='';
  selectedRole='';
  document.getElementById('btnA').className='role-btn';
  document.getElementById('btnB').className='role-btn';
}
function onTyping(){
  const val=document.getElementById('msgInput').value;
  window.sendTyping(val);
  const inp=document.getElementById('msgInput');
  const r=inp.getBoundingClientRect();
  if(Math.random()<0.3) sparkle(r.left+Math.random()*r.width,r.top-10);
}
function onSend(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text) return;
  window.sendMessage(text);inp.value='';
  const r=inp.getBoundingClientRect();
  for(let i=0;i<5;i++) setTimeout(()=>sparkle(r.left+Math.random()*r.width,r.top-20),i*80);
}
document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter')onSend();});
</script>
</body>
</html>
